name: Staging Pipeline

on:
    push:
        branches: [main]

# Prevent race between staging and release workflows
concurrency:
    group: staging-pipeline
    cancel-in-progress: false

jobs:
    # Guard: skip when release commits land on main (they contain [skip ci])
    check-skip:
        name: Check for skip ci
        runs-on: ubuntu-latest
        if: "!contains(github.event.head_commit.message, '[skip ci]')"
        steps:
            - run: echo "Proceeding with staging pipeline"

    build-and-test:
        name: Build and Test
        runs-on: ubuntu-latest
        needs: check-skip
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: NPM install
              uses: actions/setup-node@v6
              with:
                  node-version: 24.x

            - name: Run NPM CI
              run: npm ci

            - name: Build Files
              run: npm run build

            - name: Run Core tests
              run: npm run test

            - name: Archive npm failure logs
              uses: actions/upload-artifact@v6
              if: failure()
              with:
                  name: npm-logs
                  path: ~/.npm/_logs

    # After tests pass, reset staging branch to main + built dist/
    update-staging:
        name: Update Staging Branch
        runs-on: ubuntu-latest
        needs: build-and-test

        env:
            GIT_AUTHOR_NAME: mparticle-automation
            GIT_AUTHOR_EMAIL: developers@mparticle.com
            GIT_COMMITTER_NAME: mparticle-automation
            GIT_COMMITTER_EMAIL: developers@mparticle.com

        steps:
            - name: Checkout main
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  ref: main
                  token: ${{ secrets.MP_INTEGRATIONS_SEMANTIC_RELEASE_BOT }}

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24.x

            - name: Install dependencies
              run: npm ci

            - name: Build distribution bundle
              run: npm run build

            - name: Reset staging to main and add dist
              run: |
                  git checkout -B staging
                  git add dist -f
                  git commit -m 'chore(build): Generate latest bundle [skip ci]'
                  git push origin staging --force
